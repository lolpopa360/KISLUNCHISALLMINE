<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>급식뭐지 — 관리자</title>
  <meta name="description" content="급식뭐지 관리자 패널">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="body-admin">

<!-- AUTH GATE -->
<div id="admin-auth" class="admin-auth-wrap">
  <div class="admin-auth-card">
    <div class="admin-auth-logo">
      <img src="assets/mascot.png" alt="" style="width:56px" onerror="this.style.display='none'">
      <h1>급식<span class="text-accent">뭐지</span> <small>관리자</small></h1>
    </div>
    <div class="auth-input-group">
      <label>아이디</label>
      <input type="text" id="admin-login-id" placeholder="관리자 아이디" class="form-input">
    </div>
    <div class="auth-input-group">
      <label>비밀번호</label>
      <input type="password" id="admin-login-pw" placeholder="비밀번호" class="form-input">
    </div>
    <button class="btn-primary" id="admin-login-btn">관리자 로그인</button>
    <p class="admin-auth-note">⚠️ 관리자 역할로 가입된 계정만 로그인 가능합니다</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="admin-panel" style="display:none">
  <header class="admin-topbar">
    <div class="admin-topbar-left">
      <img src="assets/mascot.png" alt="" style="width:32px" onerror="this.style.display='none'">
      <h1>급식<span class="text-accent">뭐지</span> <small>관리자</small></h1>
    </div>
    <div class="admin-topbar-right">
      <span class="admin-user" id="admin-user-name">관리자</span>
      <a href="index.html" class="btn-outline-sm">앱 보기 →</a>
      <button class="btn-outline-sm btn-danger-outline" id="admin-logout">로그아웃</button>
    </div>
  </header>

  <main class="admin-main">
    <!-- DATE -->
    <section class="admin-card">
      <h3>📅 날짜 선택</h3>
      <input type="date" class="form-input" id="pick-date">
    </section>

    <!-- LUNCH -->
    <section class="admin-card">
      <div class="admin-card-header">
        <h3>🌞 점심 급식</h3>
        <button class="btn-sm" id="add-lunch">+ 메뉴 추가</button>
      </div>
      <div id="lunch-list" class="menu-editor"></div>
      <div class="empty-editor" id="lunch-empty">메뉴를 추가해주세요</div>
    </section>

    <!-- DINNER -->
    <section class="admin-card">
      <div class="admin-card-header">
        <h3>🌙 저녁 석식</h3>
        <button class="btn-sm" id="add-dinner">+ 메뉴 추가</button>
      </div>
      <div id="dinner-list" class="menu-editor"></div>
      <div class="empty-editor" id="dinner-empty">메뉴를 추가해주세요</div>
    </section>

    <!-- ACTIONS -->
    <div class="admin-actions">
      <button class="btn-primary btn-lg" id="btn-save">💾 저장하기</button>
      <button class="btn-outline-sm btn-lg" id="btn-clear-day">이 날짜 삭제</button>
    </div>

    <!-- SAVED LIST -->
    <section class="admin-card">
      <h3>📋 저장된 급식 목록</h3>
      <div id="saved-list"></div>
    </section>

    <!-- USER MANAGEMENT -->
    <section class="admin-card">
      <h3>👥 사용자 관리</h3>
      <div id="user-list"></div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  function getDB(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch(e) { return fallback; } }
  function setDB(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  var authWrap = document.getElementById('admin-auth');
  var panel = document.getElementById('admin-panel');

  var session = getDB('session', null);
  if (session && session.role === 'admin') {
    authWrap.style.display = 'none';
    panel.style.display = '';
    document.getElementById('admin-user-name').textContent = session.name + ' 님';
    initAdmin();
  }

  document.getElementById('admin-login-btn').addEventListener('click', async function(){
    var id = document.getElementById('admin-login-id').value.trim();
    var pw = document.getElementById('admin-login-pw').value;
    if (!id || !pw) { toast('아이디와 비밀번호를 입력하세요'); return; }

    var btn = this;
    var orig = btn.textContent;
    btn.textContent = '로그인 중...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, pw })
      });
      const data = await res.json();
      btn.textContent = orig;

      if (!res.ok) { toast('❌ ' + (data.error || '아이디 또는 비밀번호가 잘못되었습니다')); return; }
      if (data.role !== 'admin') { toast('❌ 관리자 권한이 없습니다'); return; }

      setDB('session', { id: data.id, name: data.name, role: data.role });
      authWrap.style.display = 'none';
      panel.style.display = '';
      document.getElementById('admin-user-name').textContent = data.name + ' 님';
      toast('✅ 로그인 성공!');
      initAdmin();
    } catch(err) {
      btn.textContent = orig;
      toast('❌ 서버 오류');
    }
  });

  document.getElementById('admin-logout').addEventListener('click', function(){
    localStorage.removeItem('session');
    location.reload();
  });

  var emojis = ['🍚','🍲','🍜','🥩','🍗','🍖','🥘','🐟','🥬','🌿','🥒','🥗','🥦','🥚','🧆','🥛','🧃','🍊','🍎','🍌','🍰','🍞','🌽','🥕','🧀','🍕','🍔','🥟','🍣','🥮'];
  let cachedMeals = {};
  let cachedUsers = [];

  async function fetchAllData() {
    try {
      const [resM, resU] = await Promise.all([fetch('/api/meals'), fetch('/api/users')]);
      if(resM.ok) cachedMeals = await resM.json();
      if(resU.ok) cachedUsers = await resU.json();
    } catch (e) {
      console.warn('Network error', e);
    }
  }

  async function saveMealsToCloud() {
    try {
      const res = await fetch('/api/meals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cachedMeals)
      });
      if(res.ok) return true;
      return false;
    } catch(e) { return false; }
  }

  async function initAdmin() {
    document.getElementById('btn-save').textContent = '데이터 불러오는 중...';
    await fetchAllData();
    document.getElementById('btn-save').textContent = '💾 저장하기';

    var pickDate = document.getElementById('pick-date');
    var d = new Date();
    pickDate.value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

    loadDate(pickDate.value);
    renderSaved();
    renderUsers();

    pickDate.addEventListener('change', function(){ loadDate(this.value); });
    document.getElementById('add-lunch').addEventListener('click', function(){ addRow('lunch'); });
    document.getElementById('add-dinner').addEventListener('click', function(){ addRow('dinner'); });

    document.getElementById('btn-save').addEventListener('click', async function(){
      var dateVal = pickDate.value;
      if (!dateVal) { toast('📅 날짜를 선택하세요'); return; }
      var lunch = readRows('lunch');
      var dinner = readRows('dinner');
      if (lunch.length === 0 && dinner.length === 0) { toast('메뉴를 하나 이상 추가하세요'); return; }
      
      cachedMeals[dateVal] = { lunch: lunch, dinner: dinner };
      
      var btn = this;
      btn.textContent = '저장 중...';
      const ok = await saveMealsToCloud();
      btn.textContent = '💾 저장하기';
      
      if(ok) {
        toast('✅ '+dateVal+' 급식 저장 완료!');
        renderSaved();
      } else {
        toast('❌ 저장 실패');
      }
    });

    document.getElementById('btn-clear-day').addEventListener('click', async function(){
      var dateVal = pickDate.value;
      if (!dateVal) return;
      if (!confirm(dateVal+' 급식 데이터를 삭제할까요?')) return;
      
      delete cachedMeals[dateVal];
      
      var orig = this.textContent;
      this.textContent = '삭제 중...';
      const ok = await saveMealsToCloud();
      this.textContent = orig;

      if(ok) {
        loadDate(dateVal);
        renderSaved();
        toast('🗑 삭제되었습니다');
      } else {
        toast('❌ 삭제 실패');
      }
    });
  }

  function addRow(type) {
    var list = document.getElementById(type+'-list');
    var empty = document.getElementById(type+'-empty');
    empty.style.display = 'none';

    var row = document.createElement('div');
    row.className = 'editor-row';
    var optHtml = '';
    for (var i = 0; i < emojis.length; i++) optHtml += '<option>'+emojis[i]+'</option>';
    row.innerHTML =
      '<select class="form-input fi-emoji">'+optHtml+'</select>'+
      '<input type="text" class="form-input fi-name" placeholder="메뉴 이름">'+
      '<input type="number" class="form-input fi-kcal" placeholder="kcal">'+
      '<input type="text" class="form-input fi-allergy" placeholder="알레르기 (없으면 비움)">'+
      '<button class="btn-del-row">✕</button>';
    row.querySelector('.btn-del-row').addEventListener('click', function(){
      row.remove();
      if (list.children.length === 0) empty.style.display = '';
    });
    list.appendChild(row);
  }

  function readRows(type) {
    var rows = document.getElementById(type+'-list').querySelectorAll('.editor-row');
    var arr = [];
    for (var i = 0; i < rows.length; i++) {
      var inputs = rows[i].querySelectorAll('.form-input');
      var name = inputs[1].value.trim();
      if (!name) continue;
      arr.push({ emoji: inputs[0].value, name: name, kcal: parseInt(inputs[2].value)||0, allergy: inputs[3].value.trim()||null });
    }
    return arr;
  }

  function loadDate(dateStr) {
    var data = cachedMeals[dateStr];
    document.getElementById('lunch-list').innerHTML = '';
    document.getElementById('dinner-list').innerHTML = '';
    document.getElementById('lunch-empty').style.display = '';
    document.getElementById('dinner-empty').style.display = '';
    if (data) {
      if (data.lunch && data.lunch.length > 0) {
        document.getElementById('lunch-empty').style.display = 'none';
        data.lunch.forEach(function(m){ addRowWithData('lunch', m); });
      }
      if (data.dinner && data.dinner.length > 0) {
        document.getElementById('dinner-empty').style.display = 'none';
        data.dinner.forEach(function(m){ addRowWithData('dinner', m); });
      }
    }
  }

  function addRowWithData(type, data) {
    var list = document.getElementById(type+'-list');
    var row = document.createElement('div');
    row.className = 'editor-row';
    var optHtml = '';
    for (var i = 0; i < emojis.length; i++) {
      optHtml += '<option'+(emojis[i]===data.emoji?' selected':'')+'>'+emojis[i]+'</option>';
    }
    row.innerHTML =
      '<select class="form-input fi-emoji">'+optHtml+'</select>'+
      '<input type="text" class="form-input fi-name" value="'+data.name+'">'+
      '<input type="number" class="form-input fi-kcal" value="'+(data.kcal||'')+'" placeholder="kcal">'+
      '<input type="text" class="form-input fi-allergy" value="'+(data.allergy||'')+'" placeholder="알레르기">'+
      '<button class="btn-del-row">✕</button>';
    row.querySelector('.btn-del-row').addEventListener('click', function(){
      row.remove();
      var empty = document.getElementById(type+'-empty');
      if (list.children.length === 0) empty.style.display = '';
    });
    list.appendChild(row);
  }

  function renderSaved() {
    var keys = Object.keys(cachedMeals).sort().reverse();
    var el = document.getElementById('saved-list');
    if (keys.length === 0) {
      el.innerHTML = '<p class="empty-note">저장된 급식 정보가 없습니다</p>';
      return;
    }
    var html = '<div class="saved-table">';
    keys.forEach(function(k){
      var d = cachedMeals[k];
      var lNames = (d.lunch||[]).map(function(m){return m.emoji+' '+m.name;}).join(', ');
      var dNames = (d.dinner||[]).map(function(m){return m.emoji+' '+m.name;}).join(', ');
      html += '<div class="saved-row">'+
        '<div class="saved-date">'+k+'</div>'+
        '<div class="saved-menus">'+
          (lNames?'<p><strong>점심</strong> '+lNames+'</p>':'')+
          (dNames?'<p><strong>저녁</strong> '+dNames+'</p>':'')+
        '</div>'+
        '<button class="btn-del-saved" data-key="'+k+'">🗑</button>'+
      '</div>';
    });
    html += '</div>';
    el.innerHTML = html;
    var delBtns = el.querySelectorAll('.btn-del-saved');
    for (var i = 0; i < delBtns.length; i++) {
      delBtns[i].addEventListener('click', async function(){
        var key = this.getAttribute('data-key');
        if (!confirm(key+' 데이터를 삭제할까요?')) return;
        
        var origItem = cachedMeals[key];
        delete cachedMeals[key];
        
        var origText = this.textContent;
        this.textContent = '...';
        const ok = await saveMealsToCloud();
        
        if(ok) {
          renderSaved();
          toast('삭제되었습니다');
        } else {
          cachedMeals[key] = origItem; // rollback
          this.textContent = origText;
          toast('❌ 서버 오류');
        }
      });
    }
  }

  function renderUsers() {
    var el = document.getElementById('user-list');
    if (cachedUsers.length === 0) {
      el.innerHTML = '<p class="empty-note">등록된 사용자가 없습니다</p>';
      return;
    }
    var html = '<div class="user-table"><div class="ut-head"><span>이름</span><span>아이디</span><span>역할</span></div>';
    cachedUsers.forEach(function(u){
      var roleLabel = u.role === 'admin' ? '👨‍🍳 관리자' : '🧑‍🎓 학생';
      html += '<div class="ut-row"><span>'+u.name+'</span><span>'+u.id+'</span><span class="role-tag '+(u.role==='admin'?'role-admin':'role-student')+'">'+roleLabel+'</span></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

})();
</script>
</body>
</html>
